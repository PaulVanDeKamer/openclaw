name: Daily Fork Sync

on:
  schedule:
    # Daily at 03:17 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork main with upstream main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo sync PaulVanDeKamer/openclaw -b main

      - name: Trigger Android APK build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run android-apk-build.yml -R PaulVanDeKamer/openclaw --ref main
