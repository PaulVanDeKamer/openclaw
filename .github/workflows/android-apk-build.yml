name: Android APK Build

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Locate APK
        run: |
          pwd
          find . -type f | grep -Ei '\.apk$' || true
          test -f ./app/build/outputs/apk/debug/app-debug.apk && echo "APK_FOUND=./app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_ENV || true
          if [ -z "${APK_FOUND:-}" ]; then
            APK=$(find . -type f -name "*.apk" | head -n 1)
            [ -n "$APK" ] && echo "APK_FOUND=$APK" >> $GITHUB_ENV
          fi
          echo "Using APK: ${APK_FOUND:-unset}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-debug-apk
          path: /home/runner/work/openclaw/openclaw/apps/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
